household:
  system_name: household
  operating_mode: incremental_task_onboarding
  automation_method:
    default_policy: low_management_automation_from_facts_already_recorded
    planning_bias:
      - during_reboot_weeks_prefer_two_real_tasks_over_a_large_chore_board
      - threshold_tasks_still_need_manual_reality_checks
  notes:
    - start_with_real_tasks_that_are_actually_showing_up
    - split_tasks_only_when_cadence_or_handling_meaningfully_differs

