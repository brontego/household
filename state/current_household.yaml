household:
  system_name: household
  operating_mode: incremental_task_onboarding
  automation_method:
    default_policy: low_management_automation_from_facts_already_recorded
    automate_now:
      - derive_due_status_for_calendar_and_hybrid_tasks_from_last_done_and_target_frequency_days
      - derive_next_due_estimate_when_a_task_has_a_real_completion_date_and_usable_cadence
      - surface_weekly_candidates_from_status_effort_and_current_signal
      - carry_forward_unfinished_tasks_until_done_or_consciously_rescoped
      - prompt_cadence_review_after_one_to_two_real_cycles
    planning_bias:
      - when_other_systems_are_heavy_prefer_one_low_to_medium_household_task
      - threshold_tasks_still_need_manual_reality_checks_like_hamper_fullness_or_bins_being_real
    do_not_try_yet:
      - fully_automatic_threshold_detection
      - supplies_tracking
      - room_cleanliness_state
  notes:
    - start_with_real_tasks_that_are_actually_showing_up
    - split_tasks_only_when_cadence_or_handling_meaningfully_differs

